[workspace]
members = ["client", "server", "core"]
resolver = "3"

[workspace.package]
authors = ["Yohan Lopes R."]
edition = "2024"
license = "AGPLv3"
repository = "https://github.com/YoYolops/cumulus"

[workspace.dependencies]
anyhow = "1.0.100"
thiserror = "2"
tokio = { version = "1.47.1", features = ["full"] }
notify = { version = "8.1.0", features = ["serde"] }
bincode = { version = "2.0.1", features = ["serde"] }