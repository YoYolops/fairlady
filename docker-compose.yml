services:
  kubo_node:
    build: 
      context: ./kubo_node
      dockerfile: Dockerfile
    container_name: kubo_node
    restart: always
    ports:
      - "4001:4001/tcp"
      - "4001:4001/udp"
      - "127.0.0.1:5001:5001"
      - "127.0.0.1:8080:8080"
    volumes:
      # Data Persistence
      - ./kubo_node/data:/data/ipfs